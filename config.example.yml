app:
  host: 0.0.0.0
  port: 8000
  base_url: http://localhost:8000
  language: fr            # default UI language; FR or EN
  data_dir: /data         # bind-mount this in Docker — holds SQLite + chat transcripts

auth:
  username: mickael
  # Generate with: uv run second-brain hash-password
  password_hash: "$2b$12$REPLACE_ME_WITH_A_REAL_BCRYPT_HASH_..............."
  session_secret: "change-me-to-a-long-random-string"
  session_lifetime_days: 30

# ---------------------------------------------------------------------------
# LLM providers — declare as many as you like; choose one as `default`.
# Each provider exposes one or more `models`; the first model in the list is
# the provider's default. The chat UI picks any provider/model combo, and
# every chat request can override per-message.
# ---------------------------------------------------------------------------
llm:
  default: chatgpt-pro    # provider name to use when none is specified
  max_tool_rounds: 10     # stop runaway tool-call loops

  providers:
    # ── ChatGPT Plus / Pro / Team subscription via OAuth ─────────────────
    # Authenticate ONCE with the device flow:
    #     docker compose run --rm second-brain second-brain chatgpt-login chatgpt-pro
    # Visit https://auth.openai.com/codex/device, enter the printed code,
    # authorize. Tokens land at {data_dir}/chatgpt_oauth/<provider>.json
    # and refresh automatically before every request. No api_key / base_url
    # needed — auth comes from the OAuth token file.
    chatgpt-pro:
      kind: chatgpt
      models:
        - gpt-5-codex            # default (first in list) — codex-tuned GPT-5
        - gpt-5-codex-high       # higher reasoning effort
        - gpt-5-codex-low        # lower reasoning effort, faster

    # ── OpenAI API (paid credits, separate from a ChatGPT subscription) ──
    openai:
      kind: openai
      base_url: https://api.openai.com/v1
      api_key: sk-REPLACE_ME
      models:
        - gpt-4o-mini
        - gpt-4o
        - o4-mini

    # ── Anthropic API ────────────────────────────────────────────────────
    # Adapter ships in a later phase; entry shown here for shape parity.
    anthropic:
      kind: anthropic
      base_url: https://api.anthropic.com
      api_key: sk-ant-REPLACE_ME
      models:
        - claude-opus-4-5
        - claude-sonnet-4-5
        - claude-haiku-4-5

    # ── Any OpenAI-compatible endpoint (vLLM / llama.cpp / OpenRouter /
    #     Groq / LM Studio / Ollama / …) — just point base_url at it. ─────
    local:
      kind: openai
      base_url: http://192.168.1.20:8080/v1
      api_key: none
      models:
        - llama-3.1-70b-instruct

# ---------------------------------------------------------------------------
# Obsidian — your vault is the brain's only memory.
#
# Three context files at the vault root are auto-injected into the LLM's
# system prompt at every chat session, so the brain always has them in mind:
#   - INDEX.md       — your map of the vault (folders + conventions).
#   - USER.md        — facts about you (role, languages, family, …).
#   - PREFERENCES.md — how you want the brain to operate (tone, capture
#                      rules, tag conventions, …).
# Any of the three may be absent — the brain still works, just less informed.
# The brain can also UPDATE these files via vault.write / vault.append when
# you share new info or preferences (e.g. "remember I'm vegetarian").
# ---------------------------------------------------------------------------
obsidian:
  vault_path: /vault
  index_file: INDEX.md
  user_file: USER.md
  preferences_file: PREFERENCES.md
  journal:
    folder: Journal
    # Today's note sits at "{folder}/{date}.md". The nightly job moves prior
    # days into this archive_template path.
    archive_template: "{folder}/{year:04d}/{month:02d}/{date}.md"
  git:
    enabled: true
    remote: origin
    branch: main
    ssh_key_path: /run/secrets/obsidian_ssh
    author_name: "Second Brain"
    author_email: "second-brain@local"

# ---------------------------------------------------------------------------
# Nightly Organize — runs in two phases:
#   1. Journal archival: Journal/YYYY-MM-DD.md → Journal/YYYY/MM/...
#   2. LLM Organize pass: per-note proposals (move, tags, wikilinks,
#      refactor) using INDEX/USER/PREFERENCES as context.
# In dry-run mode the proposals are emailed; in apply mode they are written
# through the git guard (one descriptive commit per operation).
# ---------------------------------------------------------------------------
organize:
  enabled: true
  schedule: "0 3 * * *"      # cron expression (UTC)
  mode: dry-run              # dry-run | apply — start dry-run for the first month
  modified_since: last_run   # last_run | always_full

# ---------------------------------------------------------------------------
# News — pulls articles from your RSS aggregator (FreshRSS via the
# Fever-compatible API) on a cron schedule. Articles' metadata sits in
# SQLite; full bodies live on disk under <data_dir>/news_summaries/.
# ---------------------------------------------------------------------------
news:
  enabled: false                     # flip to true once `sources.freshrss` is filled in
  fetch_schedule: "*/5 * * * *"      # cron (UTC) — pull new items every 5 minutes
  sources:
    freshrss:
      base_url: "https://freshrss.example.com/api/fever.php"
      # api_key is md5(username:password). Pre-compute once:
      #   echo -n "youruser:yourpassword" | md5sum
      api_key: "REPLACE_WITH_MD5_HASH"
      max_items_per_run: 500
      # FreshRSS folder/group ids to skip on every fetch. Articles
      # from feeds in these folders are never stored. Find a folder's
      # id by editing the category in FreshRSS — it's in the URL.
      # Stringify the ids; leave empty to ingest everything.
      excluded_group_ids: []   # e.g. ["4", "12"]

# ---------------------------------------------------------------------------
# Anki — driven through the AnkiConnect plugin
# (https://ankiweb.net/shared/info/2055492159). Install it in your Anki
# desktop, keep Anki running while the brain is running, and the brain
# talks to the plugin's JSON-RPC HTTP endpoint for everything (decks,
# cards, sync trigger, note creation). There is no local mirror.
#
# Set `api_key` only if you've configured one in AnkiConnect's settings.
# Built-in note types used here: `Basic` (Front → Back) and
# `Basic (and reversed card)` (creates two cards).
# ---------------------------------------------------------------------------
anki:
  enabled: false                     # flip to true once Anki + AnkiConnect are running
  host: 127.0.0.1
  port: 8765
  api_key: null                      # only if AnkiConnect's apiKey is set
  timeout_seconds: 10.0

# ---------------------------------------------------------------------------
# SMTP — outbound only. Used for the nightly Organize report.
# When `enabled: false`, the report is logged to stdout instead of emailed
# (handy during initial setup so you can verify cron without an SMTP server).
#
# Pick `security` to match your provider:
#   - starttls (default) — port 587, plain → STARTTLS upgrade.
#   - ssl                 — port 465, SSL/TLS from the start.
#   - none                — plain SMTP, no TLS (only on a trusted network).
# ---------------------------------------------------------------------------
smtp:
  enabled: false
  host: smtp.example.com
  port: 587
  security: starttls         # starttls | ssl | none
  username: brain@example.com
  password: REPLACE_ME
  from_address: "Second Brain <brain@example.com>"
  to_address:   "you@example.com"
  format: text               # text | html

logging:
  level: INFO                # DEBUG | INFO | WARNING | ERROR
  format: text               # text | json
